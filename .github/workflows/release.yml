name: Release

on:
  push:
    tags:
      - 'v*'        # Trigger on tags like v1.2.3

env:
  DEBIAN_FRONTEND: noninteractive
  TZ: America/Los_Angeles

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # Needed for proper versioning if you use it

      - name: install packages
        run: |
          sudo apt-get update
          sudo apt-get install -y guile-3.0-dev texlive texlive-plain-generic plotutils libplot-dev

      - name: Bootstrap and generate configure
        run: autoreconf -vif

      - name: Configure
        run: ./configure

      - name: Make distcheck
        run: make distcheck

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Import GPG signing key
        id: import_gpg
        continue-on-error: true
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          git_config_global: true
          git_user_signingkey: true

      - name: Find the distribution tarball
        id: dist
        run: |
          TAR_FILE=$(ls *.tar.gz | head -n1)
          echo "tar_file=$TAR_FILE" >> $GITHUB_OUTPUT
          echo "Found tarball: $TAR_FILE"

      - name: Sign the distribution tarball with GPG
        continue-on-error: true
        run: |
          if [ -f "${{ steps.dist.outputs.tar_file }}" ]; then
            gpg --armor --detach-sign ${{ steps.dist.outputs.tar_file }}
          fi

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            ${{ steps.dist.outputs.tar_file }}
            ${{ steps.dist.outputs.tar_file }}.asc
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
