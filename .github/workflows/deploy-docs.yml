name: Deploy Documentation to GitHub Pages

on:
  # Trigger on pushes to main (or master) that affect the docs
  push:
    branches: [ main, master ]
    paths:
      - 'docs/**'
      - 'Makefile'
      - 'configure.ac'
      - '*.m4'
  # Or trigger manually from the Actions tab
  workflow_dispatch:

# Sets permissions for deploying to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: env
        run: export LANG=C.UTF-8 TERM=dumb VERBOSE=true DEBIAN_FRONTEND=noninteractive TZ=America/Los_Angeles
      - name: install packages
        run: sudo apt-get install -y guile-3.0-dev texlive texlive-plain-generic plotutils libplot-dev

      - name: Bootstrap and configure
        run: |
          autoreconf -vif
          ./configure --prefix=/usr

      - name: Build HTML documentation
        run: |
          make
          make html
          ls -R docs

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload documentation as artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # This uploads the *contents* of the docs/ directory
          # so they become the root of the /guile_plotutils page
          path: './docs/guile-plotutils.html/'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
